name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish Python distro to PyPI
    runs-on: ubuntu-latest
    permissions:
      # This permission is required for Trusted Publishing (OIDC) to PyPI
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install hatch

    - name: Build package
      run: |
        hatch build

    - name: Publish package distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # Trusted Publishing automatically authenticates with PyPI using the OIDC token
        skip-existing: true
